name: Deploy develop

on:
  pull_request:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - uses: darwinia-network/devops/actions/smart-vercel@def47cdab63e6ff6c5ab0014c58dc3f23cb09bba
        name: Deploy to Vercel
        with:
          node_version: 22
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_group: itering
          preview_output: true
          project_name: degov-home
          dist_path: out
          script_install: pnpm install --frozen-lockfile
          script_build: pnpm build
          enable_notify_comment: true
          enable_notify_slack: false
          slack_channel: public-degov
          slack_webhook: ${{ secrets.SLACK_INCOMING_WEBHOOK_URL }}
