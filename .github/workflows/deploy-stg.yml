name: Deploy staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_VERSION: 22
      PNPM_VERSION: 10.32.1
      PROJECT_NAME: degov-home
      VERCEL_GROUP: itering
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: CI=false pnpm build

      - name: Prepare deploy directory
        id: prepare_deploy
        shell: bash
        run: |
          set -euo pipefail
          deploy_root="$(mktemp -d)"
          app_dir="$deploy_root/${PROJECT_NAME}"
          cp -R out "$app_dir"
          if [ -f vercel.json ]; then
            cp vercel.json "$app_dir/"
          fi
          {
            echo "app_dir=$app_dir"
            echo "deploy_root=$deploy_root"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare vercel cli
        run: |
          npm uninstall -g vercel || true
          npm install -g vercel@50.13.2
          vercel --version

      - name: Deploy to Vercel
        id: deploy_vercel
        shell: bash
        working-directory: ${{ steps.prepare_deploy.outputs.app_dir }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel_args=(--token "$VERCEL_TOKEN" --scope "$VERCEL_GROUP")
          vercel link --yes "${vercel_args[@]}"
          vercel deploy "${vercel_args[@]}" 2>&1 | tee deploy.log
          deployment_url="$(grep -Eo 'https://[^[:space:]]+' deploy.log | tail -n 1)"
          if [ -z "$deployment_url" ]; then
            echo "Failed to capture deployment URL from Vercel output" >&2
            exit 1
          fi
          {
            echo "preview_link=$deployment_url"
          } >> "$GITHUB_OUTPUT"
